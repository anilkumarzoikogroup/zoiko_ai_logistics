name: Zoiko CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main]

# Cancel stale runs on feature branches; never cancel on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.11"          # matches production Dockerfile
  PYTHONIOENCODING: utf-8
  ZOIKO_ISSUER: https://auth.zoikotech.com
  ZOIKO_DEV_SECRET: zoiko-dev-secret-for-testing-only   # CI-only test value
  # ZOIKO_DEV_MODE is set per-job: true for phase2/3 (API tests need it),
  # NOT set for phase4 (unit tests assert gate rejection behaviour)

# ─────────────────────────────────────────────────────────────────────────────
# GATE 0  Security scan — runs in parallel with lint, never blocks deploy alone
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  security-scan:
    name: Security Scan (pip-audit + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
        continue-on-error: true   # warn only — harden to fail before public launch

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zoiko-frontend/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: zoiko-frontend/frontend

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        working-directory: zoiko-frontend/frontend
        continue-on-error: true   # warn only — harden to fail before public launch

# ─────────────────────────────────────────────────────────────────────────────
# GATE 1  Lint — blocks all downstream gates
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff
      - run: ruff check .

# ─────────────────────────────────────────────────────────────────────────────
# GATE 2  JCS vectors — HARD BLOCK (100% required, no exceptions)
# ─────────────────────────────────────────────────────────────────────────────
  jcs-vectors:
    name: JCS Vectors (hard block)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms

      - name: JCS canonical vectors (must be 100%)
        run: python -m pytest phase-0/packages/zoiko-common/tests/crypto/test_jcs.py -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 3a  Crypto + Merkle
# GATE 3b  KMS hierarchy
# Both run in parallel after JCS passes
# ─────────────────────────────────────────────────────────────────────────────
  crypto:
    name: Crypto + Merkle
    runs-on: ubuntu-latest
    needs: jcs-vectors
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common
      - run: python -m pytest phase-0/packages/zoiko-common/tests/ -v --tb=short

  kms:
    name: KMS Hierarchy
    runs-on: ubuntu-latest
    needs: jcs-vectors
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: python -m pytest phase-1/packages/zoiko-kms/tests/ -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 4  Phase 1 — Kafka + OPA + OIDC
# ─────────────────────────────────────────────────────────────────────────────
  phase1:
    name: Phase 1 (Kafka + OPA + OIDC)
    runs-on: ubuntu-latest
    needs: [crypto, kms]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: python -m pytest phase-1/tests/ -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 5a  Phase 2 Integration — uses Neon DB (secret: NEON_DB_URL)
# GATE 5b  Phase 3 Integration — uses Neon DB (secret: NEON_DB_URL)
# GATE 5c  Phase 4 Tests       — uses Neon DB (secret: NEON_DB_URL)
# All three run in parallel after phase1 passes
# ─────────────────────────────────────────────────────────────────────────────
  phase2:
    name: Phase 2 Integration
    runs-on: ubuntu-latest
    needs: phase1
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
      ZOIKO_DEV_MODE: "true"    # needed for API gateway auth bypass in tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms

      - name: Write .env
        run: echo "DB_URL=${{ secrets.NEON_DB_URL }}" > .env

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed CI tenant
        run: python scripts/ci_seed_tenant.py

      - name: Seed contract rates
        run: python seed_contract_rates.py
        working-directory: phase-2

      - name: Run Phase 2 tests
        run: python -m pytest phase-2/ -v --tb=short -q

  phase3:
    name: Phase 3 Integration
    runs-on: ubuntu-latest
    needs: phase1
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
      ZOIKO_DEV_MODE: "true"    # needed for API gateway auth bypass in tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms

      - name: Write .env
        run: echo "DB_URL=${{ secrets.NEON_DB_URL }}" > .env

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed CI tenant
        run: python scripts/ci_seed_tenant.py

      - name: Seed contract rates
        run: python seed_contract_rates.py
        working-directory: phase-2

      - name: Run Phase 3 tests
        run: python -m pytest phase-3/ -v --tb=short -q

  phase4:
    name: Phase 4 Tests
    runs-on: ubuntu-latest
    needs: phase1
    # Phase 4 tests are all unit tests (no DB required — use "unused-url" +
    # MockKafkaBroker). The integration test is explicitly skipif(True).
    # Running alembic in parallel with phase2/3 causes advisory lock conflicts
    # on the shared Neon DB, so we skip migrations here entirely.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms

      - run: python -m pytest phase-4/tests/ -v --tb=short -q

# ─────────────────────────────────────────────────────────────────────────────
# GATE 6  Frontend — TypeScript build + type check
# Runs after lint (parallel with phase gates)
# ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript build)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zoiko-frontend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: zoiko-frontend/frontend

      - name: Build
        run: npm run build
        working-directory: zoiko-frontend/frontend
        env:
          VITE_USE_MOCK: "true"
          VITE_API_BASE: "/api"
          VITE_DEV_JWT: "ci-token"
          VITE_DEV_TENANT: "11111111-1111-1111-1111-111111111111"

# ─────────────────────────────────────────────────────────────────────────────
# GATE 7  Docker build — verifies both Dockerfiles produce valid images
# Final gate: needs all integration + frontend jobs to pass first
# ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [phase2, phase3, phase4, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile -t zoiko-backend:ci .

      - name: Build frontend image
        run: docker build -f zoiko-frontend/frontend/Dockerfile -t zoiko-frontend:ci zoiko-frontend/frontend

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY  Tenant isolation fuzzer — main branch only
# ─────────────────────────────────────────────────────────────────────────────
  tenant-fuzzer:
    name: Tenant Isolation Fuzzer
    runs-on: ubuntu-latest
    needs: phase2
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms

      - name: Write .env
        run: echo "DB_URL=${{ secrets.NEON_DB_URL }}" > .env

      - run: alembic upgrade head
      - run: python phase-0/scripts/tenant_fuzzer.py
