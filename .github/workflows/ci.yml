name: Zoiko CI

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main]

# Cancel stale runs on feature branches; never cancel on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.11"
  PYTHONIOENCODING: utf-8
  ZOIKO_ISSUER: https://auth.zoikotech.com
  ZOIKO_DEV_SECRET: zoiko-dev-secret-for-testing-only
  # Short alias reused in every job that touches the SC-001 spine
  SC001: backend/slices/sc-001-freight-invoice-overcharge/spine

# ─────────────────────────────────────────────────────────────────────────────
# GATE 0  Security scan — runs in parallel with lint, never blocks deploy alone
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  security-scan:
    name: Security Scan (pip-audit + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zoiko-frontend/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: zoiko-frontend/frontend

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        working-directory: zoiko-frontend/frontend
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# GATE 1  Lint — blocks all downstream gates
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff
      - run: ruff check .

# ─────────────────────────────────────────────────────────────────────────────
# GATE 2  JCS vectors — HARD BLOCK (100% required, no exceptions)
# ─────────────────────────────────────────────────────────────────────────────
  jcs-vectors:
    name: JCS Vectors (hard block)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common

      - name: JCS canonical vectors (must be 100%)
        run: |
          python -m pytest \
            ${{ env.SC001 }}/core_lib/packages/zoiko-common/tests/crypto/test_jcs.py \
            -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 3a  Crypto + Merkle
# GATE 3b  KMS hierarchy
# Both run in parallel after JCS passes
# ─────────────────────────────────────────────────────────────────────────────
  crypto:
    name: Crypto + Merkle
    runs-on: ubuntu-latest
    needs: jcs-vectors
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: |
          python -m pytest \
            ${{ env.SC001 }}/core_lib/packages/zoiko-common/tests/ \
            -v --tb=short

  kms:
    name: KMS Hierarchy
    runs-on: ubuntu-latest
    needs: jcs-vectors
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: pip install -e ${{ env.SC001 }}/platform_lib/packages/zoiko-kms
      - run: |
          python -m pytest \
            ${{ env.SC001 }}/platform_lib/packages/zoiko-kms/tests/ \
            -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 4  Platform — Kafka + OPA + OIDC
# ─────────────────────────────────────────────────────────────────────────────
  platform:
    name: Platform (Kafka + OPA + OIDC)
    runs-on: ubuntu-latest
    needs: [crypto, kms]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: pip install -e ${{ env.SC001 }}/platform_lib/packages/zoiko-kms
      - run: |
          python -m pytest \
            ${{ env.SC001 }}/platform_lib/tests/ \
            -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# GATE 5  DB Migrations — runs once after platform passes
# Gateway and Governance depend on this to avoid parallel advisory lock conflicts
# ─────────────────────────────────────────────────────────────────────────────
  migrate:
    name: DB Migrations (Neon)
    runs-on: ubuntu-latest
    needs: platform
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

# ─────────────────────────────────────────────────────────────────────────────
# GATE 6a  Gateway Integration   — uses Neon DB (secret: NEON_DB_URL)
# GATE 6b  Governance Integration — uses Neon DB (secret: NEON_DB_URL)
# GATE 6c  Execution Tests        — unit tests only (no DB required)
# All three run in parallel after migrate passes
# ─────────────────────────────────────────────────────────────────────────────
  gateway:
    name: Gateway Integration
    runs-on: ubuntu-latest
    needs: migrate
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
      ZOIKO_DEV_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: pip install -e ${{ env.SC001 }}/platform_lib/packages/zoiko-kms

      - name: Run Gateway tests
        run: python -m pytest -v --tb=short -q
        working-directory: ${{ env.SC001 }}/gateway

  governance:
    name: Governance Integration
    runs-on: ubuntu-latest
    needs: migrate
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
      ZOIKO_DEV_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: pip install -e ${{ env.SC001 }}/platform_lib/packages/zoiko-kms

      - name: Run Governance tests
        run: python -m pytest -v --tb=short -q
        working-directory: ${{ env.SC001 }}/governance

  execution:
    name: Execution Tests
    runs-on: ubuntu-latest
    needs: migrate
    # All unit tests — MockKafkaBroker, no DB. Running separately avoids
    # advisory lock conflicts when gateway + governance run migrations in parallel.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: pip install -e ${{ env.SC001 }}/platform_lib/packages/zoiko-kms

      - name: Run Execution tests
        run: python -m pytest tests/ -v --tb=short -q
        working-directory: ${{ env.SC001 }}/execution

# ─────────────────────────────────────────────────────────────────────────────
# GATE 7  Frontend — TypeScript build + type check
# Runs after lint (parallel with phase gates)
# ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript build)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zoiko-frontend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: zoiko-frontend/frontend

      - name: Build
        run: npm run build
        working-directory: zoiko-frontend/frontend
        env:
          VITE_USE_MOCK: "true"
          VITE_API_BASE: "/api"
          VITE_DEV_JWT: "ci-token"
          VITE_DEV_TENANT: "11111111-1111-1111-1111-111111111111"

# ─────────────────────────────────────────────────────────────────────────────
# GATE 8  Docker build — verifies Dockerfile and frontend Dockerfile are valid
# Final gate: needs all integration + frontend jobs to pass first
# ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [gateway, governance, execution, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile -t zoiko-backend:ci .

      - name: Build frontend image
        run: docker build -f zoiko-frontend/frontend/Dockerfile -t zoiko-frontend:ci zoiko-frontend/frontend

      - name: Build OPA image
        run: docker build -f opa/Dockerfile -t zoiko-opa:ci .

# ─────────────────────────────────────────────────────────────────────────────
# GATE 8  Slice boot smoke test — SC-003/004/005 have no pytest suites, so this
# is their only CI coverage: boot each service in the real backend image and
# hit /health. Also covers SC-002 governance (pytest-covered above, but cheap
# to double-check it actually boots in the production image).
# ─────────────────────────────────────────────────────────────────────────────
  slices-boot-smoke:
    name: Slice Boot Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile -t zoiko-backend:ci .

      - name: Boot each slice service and check /health
        run: |
          set -e
          declare -a SERVICES=(
            "sc002-governance:backend/slices/sc-002-carrier-claim/spine/governance:8012"
            "sc003-gateway:backend/slices/sc-003-shipment-exception/spine/gateway:8020"
            "sc003-execution:backend/slices/sc-003-shipment-exception/spine/execution:8021"
            "sc004-gateway:backend/slices/sc-004-supplier-scorecard/spine/gateway:8030"
            "sc004-execution:backend/slices/sc-004-supplier-scorecard/spine/execution:8031"
            "sc005-gateway:backend/slices/sc-005-accessorial-dispute/spine/gateway:8040"
            "sc005-execution:backend/slices/sc-005-accessorial-dispute/spine/execution:8041"
          )
          for entry in "${SERVICES[@]}"; do
            IFS=":" read -r name dir port <<< "$entry"
            echo "── Booting $name on port $port ──"
            cid=$(docker run -d -e DB_URL="$DB_URL" -e ZOIKO_DEV_MODE=true -e PYTHONIOENCODING=utf-8 \
              -p "$port:$port" zoiko-backend:ci \
              sh -c "cd $dir && python -m uvicorn services.api_gateway.app:app --host 0.0.0.0 --port $port")
            sleep 8
            if curl -f -s "http://localhost:$port/health" -o /dev/null; then
              echo "$name healthy"
            else
              echo "$name FAILED health check"
              docker logs "$cid"
              docker stop "$cid" >/dev/null
              exit 1
            fi
            docker stop "$cid" >/dev/null

          done

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY  Tenant isolation fuzzer — main branch only
# ─────────────────────────────────────────────────────────────────────────────
  tenant-fuzzer:
    name: Tenant Isolation Fuzzer
    runs-on: ubuntu-latest
    needs: gateway
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    env:
      DB_URL: ${{ secrets.NEON_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install -e ${{ env.SC001 }}/core_lib/packages/zoiko-common
      - run: pip install -e ${{ env.SC001 }}/platform_lib/packages/zoiko-kms

      - run: |
          python ${{ env.SC001 }}/core_lib/scripts/tenant_fuzzer.py
