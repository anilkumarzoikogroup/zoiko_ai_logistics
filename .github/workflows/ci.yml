name: Zoiko CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DB_URL:           postgresql://postgres:1234@localhost:5432/zoiko
  ZOIKO_DEV_MODE:   "true"
  ZOIKO_DEV_SECRET: zoiko-dev-secret-for-testing-only
  ZOIKO_ISSUER:     https://auth.zoikotech.com
  PYTHONIOENCODING: utf-8

jobs:

  # ── Gate 1: JCS test vectors (hard CI block) ──────────────────────────────
  jcs-vectors:
    name: JCS Vectors (hard block)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: python -m pytest phase-0/packages/zoiko-common/tests/crypto/test_jcs.py -v --tb=short
        name: JCS canonical vectors

  # ── Gate 2: Crypto + Merkle ────────────────────────────────────────────────
  crypto:
    name: Crypto + Merkle
    runs-on: ubuntu-latest
    needs: jcs-vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: python -m pytest phase-0/packages/zoiko-common/tests/ -v --tb=short

  # ── Gate 3: KMS key hierarchy ──────────────────────────────────────────────
  kms:
    name: KMS Hierarchy
    runs-on: ubuntu-latest
    needs: jcs-vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: python -m pytest phase-1/packages/zoiko-kms/tests/ -v --tb=short

  # ── Gate 4: Phase 1 — Kafka + OPA + OIDC ─────────────────────────────────
  phase1:
    name: Phase 1 Tests
    runs-on: ubuntu-latest
    needs: [crypto, kms]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: python -m pytest phase-1/tests/ -v --tb=short

  # ── Gate 5: Phase 2 — Integration (requires PostgreSQL) ───────────────────
  phase2:
    name: Phase 2 Integration
    runs-on: ubuntu-latest
    needs: [phase1]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       zoiko
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: "1234"
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - name: Run Alembic migrations
        run: |
          cd phase-0
          alembic upgrade head
        env:
          DB_URL: ${{ env.DB_URL }}
      - name: Seed dummy data (tenant + SC-001 case)
        run: |
          cd phase-0
          python scripts/seed_dummy_data.py
        env:
          DB_URL: ${{ env.DB_URL }}
      - name: Seed contract rates
        run: |
          cd phase-2
          python seed_contract_rates.py
        env:
          DB_URL: ${{ env.DB_URL }}
      - run: python -m pytest phase-2/ -v --tb=short -q
        working-directory: .
        env:
          DB_URL: ${{ env.DB_URL }}

  # ── Gate 6: Phase 3 — Integration ─────────────────────────────────────────
  phase3:
    name: Phase 3 Integration
    runs-on: ubuntu-latest
    needs: [phase2]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       zoiko
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: "1234"
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: cd phase-0 && alembic upgrade head
        env: {DB_URL: "${{ env.DB_URL }}"}
      - run: cd phase-0 && python scripts/seed_dummy_data.py
        env: {DB_URL: "${{ env.DB_URL }}"}
      - run: cd phase-2 && python seed_contract_rates.py
        env: {DB_URL: "${{ env.DB_URL }}"}
      - run: python -m pytest phase-3/ -v --tb=short -q
        env:
          DB_URL: ${{ env.DB_URL }}

  # ── Gate 7: Phase 4 — Execution Gateway unit tests ────────────────────────
  phase4:
    name: Phase 4 Gate Unit Tests
    runs-on: ubuntu-latest
    needs: [phase3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: python -m pytest phase-4/tests/ -v --tb=short -q

  # ── Gate 8: Frontend TypeScript check ─────────────────────────────────────
  frontend:
    name: Frontend TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - run: npm ci
        working-directory: zoiko-frontend/frontend
      - run: npm run build
        working-directory: zoiko-frontend/frontend
        env:
          VITE_USE_MOCK: "true"
          VITE_API_BASE: "/api"
          VITE_DEV_JWT:  "dev-token"
          VITE_DEV_TENANT: "11111111-1111-1111-1111-111111111111"

  # ── Tenant fuzzer — security hardening ────────────────────────────────────
  tenant-fuzzer:
    name: Tenant Isolation Fuzzer
    runs-on: ubuntu-latest
    needs: [phase2]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       zoiko
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: "1234"
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -r requirements.txt
      - run: pip install -e phase-0/packages/zoiko-common -e phase-1/packages/zoiko-kms
      - run: cd phase-0 && alembic upgrade head
        env: {DB_URL: "${{ env.DB_URL }}"}
      - run: python phase-0/scripts/tenant_fuzzer.py
        env:
          DB_URL: ${{ env.DB_URL }}
