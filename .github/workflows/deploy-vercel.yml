name: Deploy Frontend → Vercel

# Only fires after "Zoiko CI" completes successfully on main.
# This is the CI gate — deploy never runs if any CI job fails.
on:
  workflow_run:
    workflows: ["Zoiko CI"]
    types: [completed]
    branches: [main]

env:
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: zoiko-frontend/frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zoiko-frontend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          VITE_USE_MOCK: "false"

          # ── SC-001 (freight invoice overcharge) ───────────────────────────
          VITE_API_BASE:    "https://zoiko-api.onrender.com"
          VITE_API3_BASE:   "https://zoiko-governance.onrender.com"
          VITE_API4_BASE:   "https://zoiko-execution.onrender.com"

          # ── SC-002 (carrier claim) ─────────────────────────────────────────
          VITE_API_CLAIM_BASE:    "https://zoiko-sc002-gateway.onrender.com"
          VITE_API_CLAIM3_BASE:   "https://zoiko-sc002-governance.onrender.com"
          VITE_API_CLAIM4_BASE:   "https://zoiko-sc002-execution.onrender.com"

          # ── SC-003 (shipment exceptions / SLA breach) ──────────────────────
          VITE_API_EXC_BASE:  "https://zoiko-sc003-gateway.onrender.com"
          VITE_API_EXC4_BASE: "https://zoiko-sc003-execution.onrender.com"

          # ── SC-004 (supplier scorecard) ────────────────────────────────────
          VITE_API_SCORE_BASE:  "https://zoiko-sc004-gateway.onrender.com"
          VITE_API_SCORE4_BASE: "https://zoiko-sc004-execution.onrender.com"

          # ── SC-005 (accessorial charge dispute) ────────────────────────────
          VITE_API_ACC_BASE:  "https://zoiko-sc005-gateway.onrender.com"
          VITE_API_ACC4_BASE: "https://zoiko-sc005-execution.onrender.com"

          # ── Auth / tenant (non-secret dev values embedded at build time) ───
          VITE_DEV_JWT:    ${{ secrets.VITE_DEV_JWT }}
          VITE_DEV_TENANT: ${{ secrets.VITE_DEV_TENANT }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

      # Give Vercel ~30s to propagate then do a basic health check
      - name: Smoke test — Vercel URL
        run: |
          sleep 30
          curl -f --retry 5 --retry-delay 10 --retry-connrefused \
            https://zoiko-ai-logistics.vercel.app/ \
            -o /dev/null -w "HTTP %{http_code}\n"
        continue-on-error: true   # alert but don't fail the workflow
