name: Deploy Backend → Render

# Only fires after "Zoiko CI" completes successfully on main.
# Render's autoDeploy is OFF for every service — this workflow is the
# single deploy trigger for all thirteen (SC-001's api/execution/governance/opa,
# plus SC-002's claim-gateway/claim-execution/claim-governance, SC-003's
# exception-gateway/exception-execution, SC-004's scorecard-gateway/
# scorecard-execution, and SC-005's dispute-gateway/dispute-execution).
on:
  workflow_run:
    workflows: ["Zoiko CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy all Render services
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      # ── Trigger deploy hooks (one per Render service) ──────────────────────
      # Each hook URL is stored as a GitHub Secret. If a secret is not yet set
      # the step prints a skip message and continues — no workflow failure.
      #
      # Required secrets (get each from Render → service → Settings → Deploy Hook):
      #   RENDER_HOOK_API          zoiko-api          (SC-001 gateway)
      #   RENDER_HOOK_EXEC         zoiko-execution    (SC-001 execution)
      #   RENDER_HOOK_GOV          zoiko-governance   (SC-001 governance)
      #   RENDER_HOOK_OPA          zoiko-opa
      #   RENDER_HOOK_SC002_GW     zoiko-sc002-gateway
      #   RENDER_HOOK_SC002_EXEC   zoiko-sc002-execution
      #   RENDER_HOOK_SC002_GOV    zoiko-sc002-governance
      #   RENDER_HOOK_SC003_GW     zoiko-sc003-gateway
      #   RENDER_HOOK_SC003_EXEC   zoiko-sc003-execution
      #   RENDER_HOOK_SC004_GW     zoiko-sc004-gateway
      #   RENDER_HOOK_SC004_EXEC   zoiko-sc004-execution
      #   RENDER_HOOK_SC005_GW     zoiko-sc005-gateway
      #   RENDER_HOOK_SC005_EXEC   zoiko-sc005-execution

      - name: Trigger — zoiko-api (SC-001 gateway)
        env:
          HOOK: ${{ secrets.RENDER_HOOK_API }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_API not configured — skipping"

      - name: Trigger — zoiko-execution (SC-001 execution)
        env:
          HOOK: ${{ secrets.RENDER_HOOK_EXEC }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_EXEC not configured — skipping"

      - name: Trigger — zoiko-governance (SC-001 governance)
        env:
          HOOK: ${{ secrets.RENDER_HOOK_GOV }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_GOV not configured — skipping"

      - name: Trigger — zoiko-opa
        env:
          HOOK: ${{ secrets.RENDER_HOOK_OPA }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_OPA not configured — skipping"

      - name: Trigger — zoiko-sc002-gateway
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC002_GW }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC002_GW not configured — skipping"

      - name: Trigger — zoiko-sc002-execution
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC002_EXEC }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC002_EXEC not configured — skipping"

      - name: Trigger — zoiko-sc002-governance
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC002_GOV }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC002_GOV not configured — skipping"

      - name: Trigger — zoiko-sc003-gateway
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC003_GW }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC003_GW not configured — skipping"

      - name: Trigger — zoiko-sc003-execution
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC003_EXEC }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC003_EXEC not configured — skipping"

      - name: Trigger — zoiko-sc004-gateway
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC004_GW }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC004_GW not configured — skipping"

      - name: Trigger — zoiko-sc004-execution
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC004_EXEC }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC004_EXEC not configured — skipping"

      - name: Trigger — zoiko-sc005-gateway
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC005_GW }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC005_GW not configured — skipping"

      - name: Trigger — zoiko-sc005-execution
        env:
          HOOK: ${{ secrets.RENDER_HOOK_SC005_EXEC }}
        run: |
          [ -n "$HOOK" ] && curl -sf -X POST "$HOOK" \
            || echo "RENDER_HOOK_SC005_EXEC not configured — skipping"

      # ── Smoke-test all services (poll until healthy, 5 min each) ───────────
      # Render free-plan cold starts take 2-3 min.
      # All 13 checks run in parallel via background shell jobs.
      - name: Wait for all services to come up
        run: |
          check_health() {
            local url="$1"
            local name="$2"
            for i in $(seq 1 20); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url/health" 2>/dev/null || echo "000")
              echo "[$name] attempt $i — HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "[$name] healthy ✓"
                return 0
              fi
              sleep 15
            done
            echo "[$name] timed out after 5 minutes ✗"
            return 1
          }

          check_health "https://zoiko-api.onrender.com"              "zoiko-api"        &
          check_health "https://zoiko-execution.onrender.com"        "zoiko-execution"  &
          check_health "https://zoiko-governance.onrender.com"       "zoiko-governance" &
          check_health "https://zoiko-opa.onrender.com"              "zoiko-opa"        &
          check_health "https://zoiko-sc002-gateway.onrender.com"    "sc002-gateway"    &
          check_health "https://zoiko-sc002-execution.onrender.com"  "sc002-execution"  &
          check_health "https://zoiko-sc002-governance.onrender.com" "sc002-governance" &
          check_health "https://zoiko-sc003-gateway.onrender.com"    "sc003-gateway"    &
          check_health "https://zoiko-sc003-execution.onrender.com"  "sc003-execution"  &
          check_health "https://zoiko-sc004-gateway.onrender.com"    "sc004-gateway"    &
          check_health "https://zoiko-sc004-execution.onrender.com"  "sc004-execution"  &
          check_health "https://zoiko-sc005-gateway.onrender.com"    "sc005-gateway"    &
          check_health "https://zoiko-sc005-execution.onrender.com"  "sc005-execution"  &

          wait
          echo "All smoke tests completed."
        continue-on-error: true   # alert but don't roll back automatically
