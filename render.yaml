services:

  # ── SC-001: Freight Invoice Overcharge ─────────────────────────────────────
  # Gateway — /v1/cases, /v1/ingestion, /v1/contract-rates, /v1/tokens, C07
  - type: web
    name: zoiko-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: false

    envVars:
      - key: DB_URL
        sync: false
      - key: ZOIKO_DEV_MODE
        value: "false"
      - key: ZOIKO_DEV_SECRET
        sync: false
      - key: ZOIKO_ISSUER
        value: https://auth.zoikotech.com
      - key: JWT_TTL_SECONDS
        value: "86400"
      - key: ZOIKO_FF_SC_001_ENABLED
        value: "*"
      - key: ZOIKO_CORS_ORIGINS
        value: https://zoiko-ai-logistics.vercel.app,https://zoiko-frontend.vercel.app,http://localhost:5173
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ZOIKO_COMPANY_NAME
        value: Zoiko
      - key: ZOIKO_ADMIN_EMAIL
        sync: false
      - key: ZOIKO_ADMIN_PASSWORD
        sync: false
      - key: ZOIKO_ADMIN_NAME
        value: Platform Admin
      - key: TOKEN_TTL_MINUTES
        value: "1440"
      - key: ZOIKO_RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_INGESTION
        value: "100"
      - key: RATE_LIMIT_GOVERNANCE
        value: "20"
      - key: RATE_LIMIT_EXECUTION
        value: "10"
      - key: PYTHONIOENCODING
        value: utf-8
      - key: OPA_URL
        value: https://zoiko-opa.onrender.com
      - key: KAFKA_BOOTSTRAP
        value: ""
      - key: REDIS_URL
        value: ""

  # Execution — /v1/execute, /v1/reconcile, /v1/recovery/*, /v1/cases/{id}/acr
  - type: web
    name: zoiko-execution
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: "sh -c 'cd /app/backend/execution && python -m uvicorn services.api_gateway.app:app --host 0.0.0.0 --port $PORT --workers 2'"
    plan: free
    healthCheckPath: /health
    autoDeploy: false

    envVars:
      - key: DB_URL
        sync: false
      - key: ZOIKO_DEV_MODE
        value: "false"
      - key: ZOIKO_DEV_SECRET
        sync: false
      - key: ZOIKO_ISSUER
        value: https://auth.zoikotech.com
      - key: ZOIKO_CORS_ORIGINS
        value: https://zoiko-ai-logistics.vercel.app,https://zoiko-frontend.vercel.app,http://localhost:5173
      - key: TOKEN_TTL_MINUTES
        value: "1440"
      - key: SANCTIONS_STRICT
        value: "false"
      - key: FX_STRICT
        value: "false"
      - key: CONNECTOR_STRICT
        value: "false"
      - key: ZOIKO_RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_EXECUTION
        value: "10"
      - key: PYTHONIOENCODING
        value: utf-8
      - key: OPA_URL
        value: https://zoiko-opa.onrender.com
      - key: KAFKA_BOOTSTRAP
        value: ""
      - key: REDIS_URL
        value: ""

