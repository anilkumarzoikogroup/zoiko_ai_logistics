# Zoiko Logistics — Strimzi KafkaTopic definitions (all 17 topics)
# Deployed to GKE via: kubectl apply -f kafka/schemas/topics.yaml
#
# Partition key convention: "{tenant_id}:{case_id}"
# This guarantees ordered delivery per case for deterministic FSM replay.
#
# Retention: 7 days (604800000 ms) for all operational topics.
# Replication factor: 3 (staging/prod). Override to 1 for local dev.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: zoiko-ingestion-source-record-created-v1
  labels:
    strimzi.io/cluster: zoiko-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: "604800000"
    cleanup.policy: delete
    min.insync.replicas: "2"
---
