name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ------------------------------------------------------------------ #
  # 1. Lint (blocks merge)                                              #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: ruff check
        run: ruff check .

  # ------------------------------------------------------------------ #
  # 2. JCS test vectors — HARD BLOCK (100% required)                   #
  #    If this fails, no service code may be merged.                   #
  # ------------------------------------------------------------------ #
  jcs-vectors:
    name: JCS RFC 8785 test vectors (hard block)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install zoiko-common
        run: pip install -e "packages/zoiko-common[dev]"
      - name: Run JCS vectors (must be 100%)
        run: |
          pytest packages/zoiko-common/tests -v -m jcs_vector --tb=short
          echo "JCS_VECTORS_PASSED=true" >> $GITHUB_ENV

  # ------------------------------------------------------------------ #
  # 3. Merkle test vectors — HARD BLOCK (100% required)                #
  # ------------------------------------------------------------------ #
  merkle-vectors:
    name: Merkle tree test vectors (hard block)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install zoiko-common
        run: pip install -e "packages/zoiko-common[dev]"
      - name: Run Merkle vectors (must be 100%)
        run: |
          pytest packages/zoiko-common/tests -v -m merkle_vector --tb=short

  # ------------------------------------------------------------------ #
  # 4. Full test suite (80% coverage minimum)                           #
  # ------------------------------------------------------------------ #
  test:
    name: Tests (80% coverage gate)
    runs-on: ubuntu-latest
    needs: [jcs-vectors, merkle-vectors]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install zoiko-common
        run: pip install -e "packages/zoiko-common[dev]"
      - name: Run full test suite
        run: |
          pytest packages/zoiko-common/tests \
            --cov=zoiko_common \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

  # ------------------------------------------------------------------ #
  # 5. Docker lint (hadolint)                                           #
  # ------------------------------------------------------------------ #
  docker-lint:
    name: Docker lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint on all Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3013  # apt/pip version pinning — handled by lock files
