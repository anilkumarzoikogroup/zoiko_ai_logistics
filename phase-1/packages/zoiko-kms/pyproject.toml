[build-system]
requires      = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name        = "zoiko-kms"
version     = "1.0.0"
description = "Key Management Service abstraction for Zoiko AI Logistics"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["zoiko_kms*"]
