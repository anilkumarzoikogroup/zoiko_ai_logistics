<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zoiko AI — L&amp;S Chain Slices UI Mockup</title>
<style>
  :root{
    --navy:#0f172a; --blue:#3b82f6; --purple:#8b5cf6; --teal:#06b6d4; --emerald:#10b981;
    --bg:#f8fafc; --card:#ffffff; --border:#e2e8f0; --muted:#64748b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--navy);}
  header{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:22px 32px;}
  header h1{margin:0;font-size:20px;font-weight:700;}
  header p{margin:4px 0 0;font-size:13px;color:#94a3b8;}
  .tabs{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;}
  .tab{padding:14px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue);}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
  .panel{display:none;padding:24px 32px;max-width:1100px;}
  .panel.active{display:block;}
  .status-banner{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:20px;}
  .status-banner h2{margin:0;font-size:17px;}
  .status-banner .pct{font-size:26px;font-weight:800;}
  .badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid;letter-spacing:.3px;}
  .b-live{background:#d1fae5;color:#047857;border-color:#a7f3d0;}
  .b-partial{background:#fef3c7;color:#b45309;border-color:#fde68a;}
  .b-none{background:#f1f5f9;color:#64748b;border-color:#e2e8f0;}
  .grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;}
  .card h3{margin:0 0 12px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .case-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f1f5f9;}
  .case-row:last-child{border-bottom:none;}
  .case-id{font-family:monospace;font-size:11px;color:var(--muted);}
  .case-title{font-size:13.5px;font-weight:600;margin-top:2px;}
  .case-amt{font-weight:700;font-size:14px;}
  .pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;border:1px solid;}
  .p-blue{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe;}
  .p-amber{background:#fef3c7;color:#b45309;border-color:#fde68a;}
  .p-emerald{background:#d1fae5;color:#047857;border-color:#a7f3d0;}
  .p-slate{background:#f1f5f9;color:#475569;border-color:#e2e8f0;}
  .empty-card{background:repeating-linear-gradient(45deg,#f8fafc,#f8fafc 10px,#f1f5f9 10px,#f1f5f9 20px);border:1px dashed #cbd5e1;border-radius:10px;padding:30px;text-align:center;color:var(--muted);font-size:13px;}
  .field-list{font-size:12.5px;color:#334155;line-height:1.9;}
  .field-list b{color:var(--navy);}
  .timeline{margin-top:10px;font-size:12px;color:var(--muted);}
  .timeline span{display:block;padding:4px 0;}
  footer{padding:18px 32px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);}
</style>
</head>
<body>

<header>
  <h1>Zoiko AI — Logistics &amp; Supply Chain Stack</h1>
  <p>Slice-by-slice UI reference (mockup) — matches current Atom card / pill-badge design language</p>
</header>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<footer>Mockup only — static HTML preview, not wired to the live API. Colors/components mirror <code>RecoveryDashboard.tsx</code> + <code>index.css</code> brand tokens.</footer>

<script>
const slices = [
  {
    id:"sc1", name:"SC-001", title:"Freight Invoice Overcharge", pct:60, status:"live",
    desc:"Case Queue — invoice overcharge cases moving through evidence → governance → execution → ACR.",
    cases:[
      {id:"CASE-2026-0091", title:"BlueDart · INV-88213 · Dallas → Atlanta", amt:"₹4,500 overcharge", pill:"GOVERNANCE_PENDING", pc:"p-amber"},
      {id:"CASE-2026-0090", title:"FedEx · INV-88190 · Mumbai → Pune", amt:"₹1,200 overcharge", pill:"EXECUTED", pc:"p-blue"},
      {id:"CASE-2026-0088", title:"DHL · INV-88150 · Chennai → Bengaluru", amt:"₹2,800 recovered", pill:"CLOSED", pc:"p-emerald"},
    ],
    fields:["<b>Carrier</b> + lane + mode","<b>Contract rate</b> vs <b>invoice total</b>","<b>Overcharge reason</b> (fuel / accessorial)","<b>Confidence</b> score (0.96)","<b>ACR</b> link once certified"],
    timeline:["Evidence bundled","Finding generated (0.96 confidence)","Governance: ALLOW","Token issued","Execution dispatched","Reconciliation matched","ACR certified ⚠ (known defect)"]
  },
  {
    id:"sc2", name:"SC-002", title:"Carrier Claim Submission", pct:10, status:"partial",
    desc:"Claim record only exists as a raw DB row today — no case lifecycle UI built yet. Shown below as the target design.",
    cases:[
      {id:"CLAIM-0014", title:"Carrier XYZ · Damaged pallet · Shipment #4521", amt:"₹18,000 claimed", pill:"DRAFT", pc:"p-slate"},
    ],
    fields:["<b>Claim type</b> (damage / loss / shortage)","<b>Claimed amount</b> vs carrier counter-offer","<b>Dispute state</b> (filed → countered → settled)","<b>Linked shipment</b>"],
    timeline:["DB row created","— evidence bundling not wired —","— governance not wired —","— execution / ACR not wired —"]
  },
  {
    id:"sc3", name:"SC-003", title:"Shipment Exception / SLA Penalty", pct:5, status:"partial",
    desc:"Schema tables exist (shipments, shipment_legs). No SLA logic, no working screen yet — concept layout below.",
    cases:[
      {id:"SHIP-7740", title:"Carrier ABC · Promised Tue, arrived Thu (+2d)", amt:"₹950 SLA penalty (est.)", pill:"NOT_BUILT", pc:"p-slate"},
    ],
    fields:["<b>Committed vs actual</b> delivery time","<b>SLA schedule</b> reference","<b>Penalty</b> auto-calculated","<b>Reconciliation</b> vs carrier commitment"],
    timeline:["— nothing built past schema —"]
  },
  {
    id:"sc4", name:"SC-004", title:"Supplier Performance Scorecard", pct:0, status:"none",
    desc:"Nothing built — no supplier table, no scoring logic. Concept layout only.",
    cases:[],
    fields:["<b>Supplier</b> identity","<b>Fulfillment / quality / timing</b> scores","<b>Trend</b> over time (not a single dollar finding)"],
    timeline:["— not started —"]
  },
  {
    id:"sc5", name:"SC-005", title:"Accessorial Charge Dispute", pct:10, status:"partial",
    desc:"Detection logic already exists inside SC-001's invoice rules — no standalone dispute workflow yet.",
    cases:[
      {id:"ACC-0031", title:"Residential delivery fee · not authorized for lane", amt:"₹600 disputed", pill:"REUSABLE_RULE", pc:"p-amber"},
    ],
    fields:["<b>Tariff reference</b> lookup","<b>Partial-acceptance</b> reconciliation","<b>Charge type</b> (detention/lumper/liftgate/fuel)"],
    timeline:["Rule exists inside SC-001 validator","— no separate entity/workflow —"]
  },
  {
    id:"sc6", name:"SC-006", title:"Procurement Anomaly Detection", pct:0, status:"none",
    desc:"Nothing built — no purchase_order table, no PO/ASN/receipt/invoice cross-check.",
    cases:[],
    fields:["<b>PO</b> vs <b>ASN</b> vs <b>receiving</b> vs <b>invoice</b>","<b>Variance</b> highlighting","<b>Supplier</b> link"],
    timeline:["— not started —"]
  },
  {
    id:"sc7", name:"SC-007", title:"Inventory Movement Exception", pct:0, status:"none",
    desc:"Nothing built — no inventory_movements table or logic.",
    cases:[],
    fields:["<b>Warehouse movement</b> vs system-of-record","<b>Missing / extra units</b>","<b>Multi-source</b> canonical truth"],
    timeline:["— not started —"]
  },
];

const tabsEl = document.getElementById("tabs");
const panelsEl = document.getElementById("panels");
const dotColor = s => s==="live" ? "#10b981" : s==="partial" ? "#f59e0b" : "#94a3b8";
const badgeClass = s => s==="live" ? "b-live" : s==="partial" ? "b-partial" : "b-none";
const badgeLabel = s => s==="live" ? "LIVE" : s==="partial" ? "PARTIAL" : "NOT BUILT";

slices.forEach((s,i)=>{
  const tab = document.createElement("div");
  tab.className = "tab" + (i===0?" active":"");
  tab.innerHTML = `<span class="dot" style="background:${dotColor(s.status)}"></span>${s.name}`;
  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-"+s.id).classList.add("active");
  };
  tabsEl.appendChild(tab);

  const panel = document.createElement("div");
  panel.className = "panel" + (i===0?" active":"");
  panel.id = "panel-"+s.id;

  const caseRows = s.cases.length ? s.cases.map(c=>`
    <div class="case-row">
      <div>
        <div class="case-id">${c.id}</div>
        <div class="case-title">${c.title}</div>
      </div>
      <div style="text-align:right">
        <div class="case-amt">${c.amt}</div>
        <span class="pill ${c.pc}">${c.pill}</span>
      </div>
    </div>`).join("") : `<div class="empty-card">No working case queue yet for this slice</div>`;

  panel.innerHTML = `
    <div class="status-banner">
      <div>
        <h2>${s.name} — ${s.title}</h2>
        <p style="margin:4px 0 0;font-size:12.5px;color:var(--muted)">${s.desc}</p>
      </div>
      <div style="text-align:right">
        <div class="pct" style="color:${dotColor(s.status)}">${s.pct}%</div>
        <span class="badge ${badgeClass(s.status)}">${badgeLabel(s.status)}</span>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <h3>Case Queue</h3>
        ${caseRows}
      </div>
      <div>
        <div class="card" style="margin-bottom:14px;">
          <h3>Key Fields on Case Card</h3>
          <div class="field-list">${s.fields.map(f=>`• ${f}`).join("<br>")}</div>
        </div>
        <div class="card">
          <h3>Governed Pipeline Status</h3>
          <div class="timeline">${s.timeline.map(t=>`<span>→ ${t}</span>`).join("")}</div>
        </div>
      </div>
    </div>
  `;
  panelsEl.appendChild(panel);
});
</script>
</body>
</html>
