version: "3.9"

# Production stack — using unified Dockerfile.backend for all backend services
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zoiko
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zoiko]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zoiko]

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "cd /app/phase-0/db && python -m alembic upgrade head"
    environment:
      DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres/zoiko
      PYTHONIOENCODING: utf-8
    depends_on:
      postgres:
        condition: service_healthy
    networks: [zoiko]

  seed:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python /app/seed_users.py
    environment:
      DB_URL:               postgresql://postgres:${POSTGRES_PASSWORD}@postgres/zoiko
      ZOIKO_ADMIN_EMAIL:    ${ZOIKO_ADMIN_EMAIL:-admin@zoiko.com}
      ZOIKO_ADMIN_PASSWORD: ${ZOIKO_ADMIN_PASSWORD:-changeme123}
      ZOIKO_ADMIN_NAME:     ${ZOIKO_ADMIN_NAME:-Platform Admin}
      PYTHONIOENCODING:     utf-8
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [zoiko]

  # ── Unified backend: Phase 2 (8000) + Phase 4 (8001) in one container ───────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_URL:                   postgresql://postgres:${POSTGRES_PASSWORD}@postgres/zoiko
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP:          ${KAFKA_BOOTSTRAP:-}
      ZOIKO_DEV_SECRET:         ${ZOIKO_DEV_SECRET}
      ZOIKO_ISSUER:             ${ZOIKO_ISSUER:-https://auth.zoikotech.com}
      ZOIKO_CORS_ORIGINS:       ${ZOIKO_CORS_ORIGINS:-http://localhost}
      ZOIKO_DEV_MODE:           ${ZOIKO_DEV_MODE:-false}
      ZOIKO_FF_SC_001_ENABLED:  "*"
      ZOIKO_RATE_LIMIT_ENABLED: "true"
      TOKEN_TTL_MINUTES:        ${TOKEN_TTL_MINUTES:-15}
      JWT_TTL_SECONDS:          ${JWT_TTL_SECONDS:-3600}
      GROQ_API_KEY:             ${GROQ_API_KEY:-}
      GROQ_MODEL:               ${GROQ_MODEL:-llama-3.1-8b-instant}
      EMAIL_PROVIDER:           ${EMAIL_PROVIDER:-none}
      SENDGRID_API_KEY:         ${SENDGRID_API_KEY:-}
      SENDGRID_SANDBOX:         ${SENDGRID_SANDBOX:-true}
      EMAIL_FROM:               ${EMAIL_FROM:-noreply@zoikotech.com}
      APP_URL:                  ${APP_URL:-http://localhost}
      PYTHONIOENCODING:         utf-8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks: [zoiko]

  # Frontend is deployed on Vercel — not included here.
  # Set ZOIKO_CORS_ORIGINS to your Vercel URL in .env
  # e.g. ZOIKO_CORS_ORIGINS=https://zoiko.vercel.app

volumes:
  postgres_data:
  redis_data:

networks:
  zoiko:
    driver: bridge
