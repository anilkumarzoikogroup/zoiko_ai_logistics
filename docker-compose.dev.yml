version: "3.9"

# ── Zoiko Logistics — Full local development stack ───────────────────────────
#
# Services:
#   postgres   — PostgreSQL 15 (all 25 tables, single DB)
#   redis      — Redis 7 (idempotency + token consumed lock)
#   zookeeper  — Kafka dependency
#   kafka      — Single-broker Kafka (17 topics auto-created)
#   opa        — Open Policy Agent (fail-closed freight policy)
#   api-gw-p2  — Phase 2 API Gateway (port 8000)
#   api-gw-p4  — Phase 4 Execution Gateway (port 8001)
#   frontend   — Vite dev server (port 5173)
#
# Quick start:
#   docker compose -f docker-compose.dev.yml up -d postgres redis
#   docker compose -f docker-compose.dev.yml up api-gw-p2
#   cd zoiko-frontend/frontend && npm run dev

networks:
  zoiko-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       zoiko
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [zoiko-net]

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [zoiko-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks: [zoiko-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Auto-create all 17 Zoiko topics on first publish
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [zoiko-net]

  opa:
    image: openpolicyagent/opa:latest
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
    networks: [zoiko-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend services ────────────────────────────────────────────────────────

  api-gw-p2:
    build:
      context: .
      dockerfile: phase-2/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_URL:              "postgresql://postgres:1234@postgres:5432/zoiko"
      REDIS_URL:           "redis://redis:6379"
      KAFKA_BOOTSTRAP:     "kafka:29092"
      OPA_URL:             "http://opa:8181"
      ZOIKO_DEV_MODE:      "true"
      ZOIKO_DEV_SECRET:    "zoiko-dev-secret-for-testing-only"
      ZOIKO_ISSUER:        "https://auth.zoikotech.com"
      PYTHONIOENCODING:    "utf-8"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    networks: [zoiko-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gw-p4:
    build:
      context: .
      dockerfile: phase-4/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DB_URL:              "postgresql://postgres:1234@postgres:5432/zoiko"
      REDIS_URL:           "redis://redis:6379"
      KAFKA_BOOTSTRAP:     "kafka:29092"
      OPA_URL:             "http://opa:8181"
      ZOIKO_DEV_MODE:      "true"
      ZOIKO_DEV_SECRET:    "zoiko-dev-secret-for-testing-only"
      ZOIKO_ISSUER:        "https://auth.zoikotech.com"
      PYTHONIOENCODING:    "utf-8"
    depends_on:
      postgres:  {condition: service_healthy}
      redis:     {condition: service_healthy}
      api-gw-p2: {condition: service_healthy}
    networks: [zoiko-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./zoiko-frontend/frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_USE_MOCK:  "false"
      VITE_API_BASE:  "/api"
    volumes:
      - ./zoiko-frontend/frontend/src:/app/src:ro
    depends_on:
      api-gw-p2: {condition: service_healthy}
    networks: [zoiko-net]
