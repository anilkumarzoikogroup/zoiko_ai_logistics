version: "3.9"

# ── Zoiko Logistics — Full local development stack ───────────────────────────
#
# All secrets come from .env (copy .env.example → .env and fill in values).
# Never hardcode passwords here.
#
# Quick start:
#   cp .env.example .env   # fill in values
#   docker compose -f docker-compose.dev.yml up -d postgres redis opa
#   docker compose -f docker-compose.dev.yml up migrate
#   docker compose -f docker-compose.dev.yml up

networks:
  zoiko-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       zoiko
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [zoiko-net]

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [zoiko-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks: [zoiko-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [zoiko-net]

  opa:
    build:
      context: ..
      dockerfile: opa/Dockerfile
    ports:
      - "8181:8181"
    networks: [zoiko-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── DB Migrations ────────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m alembic -c alembic.ini upgrade head
    environment:
      DB_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/zoiko"
    depends_on:
      postgres: {condition: service_healthy}
    networks: [zoiko-net]

  # ── SC-001: Freight Invoice Overcharge ───────────────────────────────────
  # Gateway (8000) + Execution (8001) + Governance (8002) via start.sh
  api-gw-p2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    environment:
      DB_URL:              "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/zoiko"
      REDIS_URL:           "redis://redis:6379"
      KAFKA_BOOTSTRAP:     "kafka:29092"
      OPA_URL:             "http://opa:8181"
      ZOIKO_DEV_MODE:      "${ZOIKO_DEV_MODE:-true}"
      ZOIKO_DEV_SECRET:    "${ZOIKO_DEV_SECRET}"
      ZOIKO_ISSUER:        "${ZOIKO_ISSUER:-https://auth.zoikotech.com}"
      GROQ_API_KEY:        "${GROQ_API_KEY:-}"
      GROQ_MODEL:          "${GROQ_MODEL:-llama-3.1-8b-instant}"
      JWT_TTL_SECONDS:     "${JWT_TTL_SECONDS:-86400}"
      TOKEN_TTL_MINUTES:   "${TOKEN_TTL_MINUTES:-1440}"
      ZOIKO_FF_SC_001_ENABLED: "*"
      ZOIKO_RATE_LIMIT_ENABLED: "true"
      ZOIKO_CORS_ORIGINS:  "${ZOIKO_CORS_ORIGINS:-http://localhost:5173}"
      EMAIL_PROVIDER:      "${EMAIL_PROVIDER:-none}"
      SENDGRID_API_KEY:    "${SENDGRID_API_KEY:-}"
      SENDGRID_SANDBOX:    "${SENDGRID_SANDBOX:-true}"
      EMAIL_FROM:          "${EMAIL_FROM:-noreply@zoikotech.com}"
      PYTHONIOENCODING:    "utf-8"
    depends_on:
      migrate:   {condition: service_completed_successfully}
      redis:     {condition: service_healthy}
      opa:       {condition: service_healthy}
    networks: [zoiko-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

