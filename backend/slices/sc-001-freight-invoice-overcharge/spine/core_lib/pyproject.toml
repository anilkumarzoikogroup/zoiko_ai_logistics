[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I", "UP", "B", "S"]
ignore = ["S101"]  # allow assert in tests

[tool.ruff.per-file-ignores]
"tests/*" = ["S", "B"]

[tool.pytest.ini_options]
testpaths = ["packages/zoiko-common/tests"]
addopts = "--strict-markers -q"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "jcs_vector: RFC 8785 JCS test vectors (hard CI block)",
    "merkle_vector: Merkle tree test vectors (hard CI block)",
]
