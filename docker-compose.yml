  # ── Frontend (port 5173) ────────────────────────────────────────────────────
  frontend:
    build:
      context: zoiko-frontend/frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_USE_MOCK:  "false"
      VITE_API_BASE:  /api
      # Proxy target overrides — Vite dev server proxies to these container names.
      # Defaults in vite.config.ts fall back to localhost for non-Docker use.
      BACKEND_GATEWAY_URL:     http://phase2:8000
      BACKEND_EXEC_URL:        http://phase4:8001
      BACKEND_GOV_URL:         http://phase3:8002
      BACKEND_SC002_GW_URL:    http://sc002-gateway:8010
      BACKEND_SC002_EXEC_URL:  http://sc002-execution:8011
      BACKEND_SC002_GOV_URL:   http://sc002-governance:8012
